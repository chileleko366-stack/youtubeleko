name: "YoutuBeLeko — All 5 Channels (CH1–CH5)"

# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  UNIFIED PIPELINE — CH1 Dopamine Loop · CH2 FinanceFiction                 ║
# ║                     CH3 Redacted · CH4 The Grey Matter · CH5 The Quiet Record ║
# ║                                                                              ║
# ║  TWO AUTOMATIC TRIGGERS                                                      ║
# ║  ─────────────────────────────────────────────────────────────────────────── ║
# ║  20:00 UTC  Nightly stage  →  generate topics + 7-stage scripts for all 5   ║
# ║  04:00 UTC  Morning stage  →  longform (Tue/Fri) + 2 shorts/day every day   ║
# ║                                                                              ║
# ║  MANUAL DISPATCH                                                             ║
# ║  ─────────────────────────────────────────────────────────────────────────── ║
# ║  stage:          nightly | morning | all   (default: all)                   ║
# ║  channels:       all | ch1,ch3 …           (default: all)                   ║
# ║  force_longform: true | false              (override Tue/Fri gate)           ║
# ║  manifest_date:  YYYY-MM-DD                (morning stage; blank = today)   ║
# ║                                                                              ║
# ║  JOB DEPENDENCY MAP                                                          ║
# ║  ─────────────────────────────────────────────────────────────────────────── ║
# ║  check-gate ──► generate-topics ──► generate-scripts                        ║
# ║             └─► [morning gate passed]                                        ║
# ║                  ├─► produce-longforms  (Tue/Fri only, single looping job)  ║
# ║                  ├─► shorts-ch1  (2 shorts, daily)                          ║
# ║                  ├─► shorts-ch2  (2 shorts, daily)                          ║
# ║                  ├─► shorts-ch3  (2 shorts, daily)                          ║
# ║                  ├─► shorts-ch4  (2 shorts, daily)                          ║
# ║                  ├─► shorts-ch5  (2 shorts, daily)                          ║
# ║                  └─► daily-summary (always, waits for all shorts jobs)      ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

on:
  schedule:
    - cron: "0 20 * * *"   # 20:00 UTC — Nightly: topic + script generation
    - cron: "0 4  * * *"   # 04:00 UTC — Morning: production + upload
  workflow_dispatch:
    inputs:
      stage:
        description: "Stage to run: nightly | morning | all"
        required: false
        default: "all"
      channels:
        description: "Channels to include: 'all' or comma-separated e.g. ch1,ch3"
        required: false
        default: "all"
      force_longform:
        description: "Force longform production even if today is not Tuesday/Friday"
        required: false
        default: "false"
      manifest_date:
        description: "Manifest date for morning stage (YYYY-MM-DD). Leave blank to use today."
        required: false
        default: ""

env:
  PYTHONPATH: ${{ github.workspace }}

# ──────────────────────────────────────────────────────────────────────────────
# REUSABLE ENV ANCHORS
# All LLM keys are passed to every AI step. Adding a new provider only requires
# adding its secret here — the ai_client.py fallback chain picks it up.
# ──────────────────────────────────────────────────────────────────────────────
# AI provider priority order (defined in scripts/ai_client.py):
#   1. Groq          200K tokens/day  → console.groq.com
#   2. Cerebras      1M  tokens/day   → cloud.cerebras.ai
#   3. SambaNova     free tier        → cloud.sambanova.ai
#   4. Gemini        1M  tokens/day   → aistudio.google.com  ← MUST use Studio key, not GCP
#   5. GitHub Models auto-injected    → models.inference.ai.azure.com
#   6. Together AI   free *-Free      → api.together.ai
#   7. OpenRouter    free :free       → openrouter.ai
#   8. Cloudflare    10K tokens/day   → dash.cloudflare.com
#   9. Pollinations  unlimited no-key → text.pollinations.ai  (last resort)

jobs:

# ══════════════════════════════════════════════════════════════════════════════
# GATE — decides which stages fire for this invocation
# ══════════════════════════════════════════════════════════════════════════════
  check-gate:
    name: "🔀 Determine Pipeline Stage"
    runs-on: ubuntu-latest
    outputs:
      run_nightly:   ${{ steps.gate.outputs.run_nightly }}
      run_morning:   ${{ steps.gate.outputs.run_morning }}
      run_longform:  ${{ steps.gate.outputs.run_longform }}
      manifest_date: ${{ steps.gate.outputs.manifest_date }}
    steps:
      - id: gate
        name: Evaluate trigger and set stage flags
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          EVENT="${{ github.event_name }}"
          STAGE="${{ inputs.stage }}"
          FORCE="${{ inputs.force_longform }}"
          INPUT_DATE="${{ inputs.manifest_date }}"
          DAY=$(date -u +%u)   # 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat 7=Sun

          echo "Trigger   : event=$EVENT schedule='$SCHEDULE'"
          echo "Dispatch  : stage=$STAGE force_longform=$FORCE date=$INPUT_DATE"
          echo "Day of week: $DAY (2=Tuesday 5=Friday)"

          # ── Nightly flag ──────────────────────────────────────────────────
          # Fires when: cron at 20:00 OR dispatch with stage=nightly|all
          if [ "$SCHEDULE" = "0 20 * * *" ] || \
             { [ "$EVENT" = "workflow_dispatch" ] && \
               { [ "$STAGE" = "nightly" ] || [ "$STAGE" = "all" ]; }; }; then
            echo "run_nightly=true"  >> $GITHUB_OUTPUT
            echo "→ Nightly stage: YES"
          else
            echo "run_nightly=false" >> $GITHUB_OUTPUT
            echo "→ Nightly stage: NO"
          fi

          # ── Morning flag ──────────────────────────────────────────────────
          # Fires when: cron at 04:00 OR dispatch with stage=morning|all
          if [ "$SCHEDULE" = "0 4 * * *" ] || \
             { [ "$EVENT" = "workflow_dispatch" ] && \
               { [ "$STAGE" = "morning" ] || [ "$STAGE" = "all" ]; }; }; then
            echo "run_morning=true"  >> $GITHUB_OUTPUT
            echo "→ Morning stage: YES"
          else
            echo "run_morning=false" >> $GITHUB_OUTPUT
            echo "→ Morning stage: NO"
          fi

          # ── Longform flag ─────────────────────────────────────────────────
          # Longform runs only on Tuesday (2) or Friday (5), or when forced.
          # Shorts run EVERY morning regardless.
          if [ "$DAY" = "2" ] || [ "$DAY" = "5" ] || [ "$FORCE" = "true" ]; then
            echo "run_longform=true"  >> $GITHUB_OUTPUT
            echo "→ Longform: YES (day=$DAY, force=$FORCE)"
          else
            echo "run_longform=false" >> $GITHUB_OUTPUT
            echo "→ Longform: NO (day=$DAY — runs Tue/Fri only)"
          fi

          # ── Manifest date ─────────────────────────────────────────────────
          # Default to today (nightly generates for same day; morning picks up today's manifest)
          if [ -n "$INPUT_DATE" ]; then
            echo "manifest_date=$INPUT_DATE" >> $GITHUB_OUTPUT
            echo "→ Manifest date: $INPUT_DATE (override)"
          else
            TODAY=$(date -u '+%Y-%m-%d')
            echo "manifest_date=$TODAY" >> $GITHUB_OUTPUT
            echo "→ Manifest date: $TODAY (auto)"
          fi

# ══════════════════════════════════════════════════════════════════════════════
# NIGHTLY STAGE — Topic + 7-Stage Script Generation  (20:00 UTC)
# ══════════════════════════════════════════════════════════════════════════════

  generate-topics:
    name: "🧠 Generate Topics (CH1–CH5)"
    needs: check-gate
    if: needs.check-gate.outputs.run_nightly == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      models: read   # required for GitHub Models fallback provider

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Verify AI provider availability
        run: |
          python - <<'PYEOF'
          # Quick pre-flight: confirm at least one AI provider key is present.
          # The script will still attempt all 9 providers in sequence,
          # but this surfaces misconfigurations early.
          import os
          keys = {
              "GROQ":         os.environ.get("GROQ_API_KEY"),
              "CEREBRAS":     os.environ.get("CEREBRAS_API_KEY"),
              "SAMBANOVA":    os.environ.get("SAMBANOVA_API_KEY"),
              "GEMINI":       os.environ.get("GEMINI_API_KEY"),
              "GITHUB_MODELS":os.environ.get("GITHUB_TOKEN"),
              "TOGETHER":     os.environ.get("TOGETHER_API_KEY"),
              "OPENROUTER":   os.environ.get("OPENROUTER_KEY"),
              "CLOUDFLARE":   os.environ.get("CLOUDFLARE_API_TOKEN"),
          }
          available = [k for k, v in keys.items() if v]
          print(f"Available AI providers ({len(available)}/8): {', '.join(available)}")
          if not available:
              # Pollinations is the final fallback — it requires no key.
              print("WARNING: No API keys found. Will rely on Pollinations (rate-limited).")
          PYEOF
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:     ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:          ${{ github.token }}
          TOGETHER_API_KEY:      ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY:        ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
        continue-on-error: true

      - name: Generate topics for all channels
        id: gen_topics
        run: python scripts/generate_topics.py
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:     ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:          ${{ github.token }}
          TOGETHER_API_KEY:      ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY:        ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify — topics generated
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status   = "${STATUS}"
          provider = os.environ.get("AI_PROVIDER", "unknown")
          date_str = date.today().isoformat()
          icon     = "✅" if status == "success" else "❌"
          note     = f" _(via {provider})_" if provider and provider != "unknown" else ""
          send_message(
              f"{icon} *Nightly — Topics* | {date_str}{note}\n"
              f"Status: {status}\nAll 5 channel topics uploaded to Cloudinary."
          )
          if status == "success":
              notify_pipeline_success("Nightly — Topics", date_str, provider)
          else:
              notify_pipeline_failure("Nightly — Topics", date_str, f"Job status: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:            ${{ secrets.GMAIL_TO }}
          AI_PROVIDER:         ${{ steps.gen_topics.outputs.ai_provider }}
        continue-on-error: true

# ──────────────────────────────────────────────────────────────────────────────

  generate-scripts:
    name: "📝 Generate 7-Stage Scripts (CH1–CH5)"
    needs: generate-topics
    # Only run if generate-topics actually succeeded — skip if it was skipped/failed.
    if: needs.generate-topics.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate full production manifests (7-stage pipeline)
        id: gen_scripts
        # Stages: 1-outline → 2-research → 3-full_script → 4-line_breakdown
        #         → 5-visual_treatments → 6-b_roll_keywords → 7-metadata
        run: python scripts/write_scripts.py
        env:
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:      ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:     ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:          ${{ github.token }}
          TOGETHER_API_KEY:      ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY:        ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify — scripts generated
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status   = "${STATUS}"
          provider = os.environ.get("AI_PROVIDER", "unknown")
          date_str = date.today().isoformat()
          icon     = "✅" if status == "success" else "❌"
          note     = f" _(via {provider})_" if provider and provider != "unknown" else ""
          send_message(
              f"{icon} *Nightly — Scripts* | {date_str}{note}\n"
              f"7-stage manifests: {status}\n"
              f"Production manifests uploaded to Cloudinary. Morning pipeline ready."
          )
          if status == "success":
              notify_pipeline_success("Nightly — Scripts", date_str, provider)
          else:
              notify_pipeline_failure("Nightly — Scripts", date_str, f"Job status: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:            ${{ secrets.GMAIL_TO }}
          AI_PROVIDER:         ${{ steps.gen_scripts.outputs.ai_provider }}
        continue-on-error: true

# ══════════════════════════════════════════════════════════════════════════════
# MORNING STAGE — Longform Production  (Tue/Fri only, single looping job)
# ══════════════════════════════════════════════════════════════════════════════
# All 5 channels are handled sequentially inside one Python script.
# This avoids 5× runner spin-up cost while still being resilient:
# each channel catches its own errors and the loop continues regardless.
# ──────────────────────────────────────────────────────────────────────────────

  produce-longforms:
    name: "🎬 Produce Longforms (CH1–CH5, Tue/Fri)"
    needs: check-gate
    if: >-
      needs.check-gate.outputs.run_morning == 'true' &&
      needs.check-gate.outputs.run_longform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (FFmpeg + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            ffmpeg \
            fonts-liberation \
            fonts-open-sans \
            fonts-dejavu-core \
            fonts-noto
          # Confirm FFmpeg version
          ffmpeg -version | head -1
          echo "Font directories:"
          fc-list | grep -i "liberation\|open-sans\|dejavu" | head -5

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        # package-lock.json now exists — npm ci is fast and reproducible
        run: npm ci --prefix remotion

      - name: Verify Remotion can render
        run: |
          cd remotion
          npx remotion --version
        continue-on-error: true

      - name: Notify — longform production starting
        run: |
          python - <<'PYEOF'
          from scripts.telegram_notify import send_message
          from datetime import date
          import os
          date_str = date.today().isoformat()
          send_message(
              f"🎬 *Morning Pipeline — Longform Start* | {date_str}\n"
              f"Producing longform videos for CH1–CH5.\n"
              f"Manifest date: {os.environ.get('MANIFEST_DATE', date_str)}"
          )
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          MANIFEST_DATE:      ${{ needs.check-gate.outputs.manifest_date }}
        continue-on-error: true

      - name: Produce all longform videos
        run: |
          python - <<'PYEOF'
          import asyncio, json, os, sys, time
          from pathlib import Path
          from datetime import date

          import requests

          sys.path.insert(0, ".")
          from scripts.stock_footage        import fetch_all_footage
          from scripts.generate_voiceover   import generate_all_voiceovers
          from scripts.generate_thumbnail   import generate_thumbnail
          from scripts.render_mographs      import render_all_lines
          from scripts.assemble_video       import assemble_video
          from scripts.upload_youtube       import upload_video, is_youtube_configured
          from scripts.telegram_notify      import send_message
          import cloudinary, cloudinary.uploader

          cloud        = os.environ["CLOUDINARY_CLOUD_NAME"]
          date_str     = os.environ.get("MANIFEST_DATE", date.today().isoformat())
          chan_env      = os.environ.get("CHANNELS", "all").strip()
          ALL_CHANNELS  = ["ch1", "ch2", "ch3", "ch4", "ch5"]

          # Channel display names for notifications
          CHANNEL_NAMES = {
              "ch1": "Dopamine Loop",
              "ch2": "FinanceFiction",
              "ch3": "Redacted",
              "ch4": "The Grey Matter",
              "ch5": "The Quiet Record",
          }
          CHANNEL_EMOJI = {
              "ch1": "🟡", "ch2": "🟢", "ch3": "🔴", "ch4": "🟣", "ch5": "🟤",
          }

          channels = ALL_CHANNELS if chan_env == "all" else [
              c.strip() for c in chan_env.split(",") if c.strip()
          ]

          Path("temp/thumbnails").mkdir(parents=True, exist_ok=True)
          Path("temp/final").mkdir(parents=True, exist_ok=True)

          results = {}

          for ch_id in channels:
              t0   = time.time()
              name = CHANNEL_NAMES.get(ch_id, ch_id.upper())
              icon = CHANNEL_EMOJI.get(ch_id, "⚪")
              print(f"\n{'='*64}\n  {icon} {ch_id.upper()} — {name}  |  {date_str}\n{'='*64}")

              # ── 1. Download manifest from Cloudinary ─────────────────────
              url = (
                  f"https://res.cloudinary.com/{cloud}/raw/upload"
                  f"/automation/manifests/{date_str}/{ch_id}.json"
              )
              r = requests.get(url, timeout=30)
              if r.status_code != 200:
                  reason = f"No manifest (HTTP {r.status_code}) — skipping {ch_id}"
                  print(f"  ⚠️  {reason}")
                  results[ch_id] = {"ok": False, "reason": reason}
                  send_message(f"{icon} *{ch_id.upper()} {name}* — skipped\n_{reason}_")
                  continue

              manifest = r.json()
              title    = manifest.get("metadata", {}).get("title", "Untitled")
              print(f"  Title      : {title}")
              print(f"  Lines      : {len(manifest.get('lines', []))}")
              print(f"  Compositions: {len(set(l.get('composition','') for l in manifest.get('lines',[])))}")
              step = {}

              # ── 2. Stock footage (Pexels) ─────────────────────────────────
              print("  [1/6] Fetching stock footage...")
              try:
                  fetch_all_footage(manifest)
                  step["footage"] = "ok"
                  print("  [1/6] ✓ Stock footage fetched")
              except Exception as exc:
                  step["footage"] = f"warn: {exc}"
                  print(f"  [1/6] ⚠️  Footage: {exc}")

              # ── 3. Voiceover (edge-tts, Microsoft Neural) ─────────────────
              print("  [2/6] Generating voiceover...")
              try:
                  asyncio.run(generate_all_voiceovers(manifest))
                  step["voiceover"] = "ok"
                  print("  [2/6] ✓ Voiceover generated")
              except Exception as exc:
                  step["voiceover"] = f"warn: {exc}"
                  print(f"  [2/6] ⚠️  Voiceover: {exc}")

              # ── 4. Thumbnail (Pollinations.ai) ────────────────────────────
              print("  [3/6] Generating thumbnail...")
              thumb = f"temp/thumbnails/{ch_id}_thumbnail.png"
              try:
                  cfg = manifest.get("channel_config", {})
                  cfg["_channel_id"] = ch_id
                  generate_thumbnail(
                      title, cfg, thumb,
                      manifest.get("metadata", {}).get("thumbnail_prompt"),
                  )
                  step["thumbnail"] = "ok"
                  print(f"  [3/6] ✓ Thumbnail saved → {thumb}")
              except Exception as exc:
                  step["thumbnail"] = f"warn: {exc}"
                  thumb = None
                  print(f"  [3/6] ⚠️  Thumbnail: {exc}")

              # ── 5. Remotion render (motion graphics per line) ─────────────
              print("  [4/6] Rendering motion graphics...")
              try:
                  render_all_lines(manifest)
                  step["render"] = "ok"
                  print("  [4/6] ✓ Motion graphics rendered")
              except Exception as exc:
                  step["render"] = f"warn: {exc}"
                  print(f"  [4/6] ⚠️  Render: {exc}")

              # ── 6. FFmpeg assembly ────────────────────────────────────────
              print("  [5/6] Assembling final video...")
              out = f"temp/final/{ch_id}_final.mp4"
              if not assemble_video(manifest, None, [], [], out):
                  step["assembly"] = "FAILED"
                  reason = "FFmpeg assembly failed"
                  results[ch_id] = {"ok": False, "title": title, "step": step, "reason": reason}
                  send_message(
                      f"{icon} *{ch_id.upper()} {name}* — ❌ ASSEMBLY FAILED\n"
                      f"Title: _{title}_\nCheck Actions logs for FFmpeg errors."
                  )
                  continue
              step["assembly"] = "ok"
              print(f"  [5/6] ✓ Video assembled → {out}")

              # ── 7. Cloudinary backup ─────────────────────────────────────
              print("  [6a/6] Uploading video to Cloudinary...")
              cld_url = None
              try:
                  cloudinary.config(
                      cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"],
                      api_key=os.environ["CLOUDINARY_API_KEY"],
                      api_secret=os.environ["CLOUDINARY_API_SECRET"],
                      secure=True,
                  )
                  cld_result = cloudinary.uploader.upload_large(
                      out,
                      public_id=f"automation/videos/{date_str}/{ch_id}_longform",
                      resource_type="video",
                      overwrite=True,
                      chunk_size=6_000_000,
                  )
                  cld_url = cld_result.get("secure_url")
                  step["cloudinary"] = "ok"
                  print(f"  [6a/6] ✓ Cloudinary → {cld_url}")
              except Exception as exc:
                  step["cloudinary"] = f"warn: {exc}"
                  print(f"  [6a/6] ⚠️  Cloudinary: {exc}")

              # ── 8. YouTube upload ─────────────────────────────────────────
              print(f"  [6b/6] Uploading to YouTube ({ch_id.upper()})...")
              if is_youtube_configured(ch_id):
                  vid_id = upload_video(out, thumb, manifest)
                  if vid_id:
                      step["youtube"] = vid_id
                      yt_url = f"https://youtu.be/{vid_id}"
                      print(f"  [6b/6] ✓ YouTube → {yt_url}")
                      send_message(
                          f"{icon} *{ch_id.upper()} {name}* — ✅ UPLOADED\n"
                          f"*{title}*\n{yt_url}"
                          + (f"\nCloudinary: {cld_url}" if cld_url else "")
                      )
                  else:
                      step["youtube"] = "upload failed"
                      print(f"  [6b/6] ⚠️  YouTube upload failed")
                      send_message(
                          f"{icon} *{ch_id.upper()} {name}* — ⚠️ Assembled, YouTube failed\n"
                          f"*{title}*"
                          + (f"\nCloudinary: {cld_url}" if cld_url else "")
                      )
              else:
                  step["youtube"] = "not configured"
                  print(f"  [6b/6] ⚠️  YouTube not configured for {ch_id}")
                  send_message(
                      f"{icon} *{ch_id.upper()} {name}* — ✅ Assembled (YouTube not configured)\n"
                      f"*{title}*"
                      + (f"\nCloudinary: {cld_url}" if cld_url else "")
                  )

              elapsed = round(time.time() - t0)
              results[ch_id] = {
                  "ok": True, "title": title, "step": step, "elapsed_s": elapsed
              }
              print(f"\n  ✅ {ch_id.upper()} complete in {elapsed}s")

          # ── Summary ───────────────────────────────────────────────────────
          print(f"\n{'='*64}\n  LONGFORM SUMMARY  |  {date_str}\n{'='*64}")
          any_failed = False
          for ch_id, data in results.items():
              name = CHANNEL_NAMES.get(ch_id, ch_id.upper())
              icon = CHANNEL_EMOJI.get(ch_id, "⚪")
              if data.get("ok"):
                  yt = data["step"].get("youtube", "?")
                  print(f"  {icon} OK   {ch_id.upper()} — {name}: '{data['title'][:40]}' ({data.get('elapsed_s','?')}s) yt={yt}")
              else:
                  any_failed = True
                  print(f"  ❌ FAIL {ch_id.upper()} — {name}: {data.get('reason','unknown')}")

          import json as _json
          Path("/tmp/longform_results.json").write_text(_json.dumps(results))

          if any_failed:
              sys.exit(1)
          PYEOF
        env:
          MANIFEST_DATE:             ${{ needs.check-gate.outputs.manifest_date }}
          CHANNELS:                  ${{ inputs.channels || 'all' }}
          CLOUDINARY_CLOUD_NAME:     ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:        ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:     ${{ secrets.CLOUDINARY_API_SECRET }}
          PEXELS_API_KEY:            ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}
          YOUTUBE_REFRESH_TOKEN_CH2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH2 }}
          YOUTUBE_REFRESH_TOKEN_CH3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH3 }}
          YOUTUBE_REFRESH_TOKEN_CH4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH4 }}
          YOUTUBE_REFRESH_TOKEN_CH5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH5 }}
          GOOGLE_DRIVE_CREDENTIALS:  ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN:        ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:          ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Upload longform results as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: longform-results-${{ needs.check-gate.outputs.manifest_date }}
          path: /tmp/longform_results.json
          retention-days: 7
        continue-on-error: true

      - name: Cleanup old Cloudinary assets
        run: python scripts/cleanup_cloudinary.py
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      - name: Notify — longform production complete
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import json, os
          from pathlib import Path
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure

          status   = "${STATUS}"
          date_str = os.environ.get("MANIFEST_DATE", date.today().isoformat())
          results_path = Path("/tmp/longform_results.json")

          if results_path.exists():
              results   = json.loads(results_path.read_text())
              ok_count  = sum(1 for v in results.values() if v.get("ok"))
              total     = len(results)
              icon_main = "✅" if ok_count == total else "⚠️"
              lines = []
              for ch_id, data in results.items():
                  ch_icons = {"ch1":"🟡","ch2":"🟢","ch3":"🔴","ch4":"🟣","ch5":"🟤"}
                  ci = ch_icons.get(ch_id, "⚪")
                  if data.get("ok"):
                      yt = data["step"].get("youtube","?")
                      tag = f"youtu.be/{yt}" if yt and len(yt)==11 else yt
                      lines.append(f"  {ci} {ch_id.upper()}: _{data['title'][:40]}_ ({tag})")
                  else:
                      lines.append(f"  ❌ {ch_id.upper()}: {data.get('reason','failed')}")
              send_message(
                  f"{icon_main} *Longform Production Complete* | `{date_str}`\n"
                  f"{ok_count}/{total} channels OK\n\n" + "\n".join(lines)
              )
              if ok_count == total:
                  notify_pipeline_success("Morning — Longforms", date_str)
              else:
                  notify_pipeline_failure("Morning — Longforms", date_str,
                      f"{total - ok_count}/{total} failed")
          else:
              send_message(
                  f"❌ *Longform Production* | `{date_str}`\n"
                  "Pipeline crashed before any channel was processed. Check Actions logs."
              )
              notify_pipeline_failure("Morning — Longforms", date_str, "No results (pipeline crash)")
          PYEOF
        env:
          MANIFEST_DATE:      ${{ needs.check-gate.outputs.manifest_date }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        continue-on-error: true

# ══════════════════════════════════════════════════════════════════════════════
# MORNING STAGE — Shorts Production  (2 per channel, every day)
# Each channel gets its own parallel job so all 10 shorts build concurrently.
# Each job self-generates a fresh topic + script — no pre-staged manifest needed.
# ══════════════════════════════════════════════════════════════════════════════

# ── SHARED SETUP MACRO ────────────────────────────────────────────────────────
# (GitHub Actions has no native YAML anchors across jobs; this comment documents
# the common step pattern repeated in each shorts job below:
#   checkout → python 3.11 → ffmpeg+fonts → pip install → npm ci → generate → assemble → upload → drive)

  shorts-ch1:
    name: "🟡 CH1 Shorts x2 — Dopamine Loop"
    needs: check-gate
    if: needs.check-gate.outputs.run_morning == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
