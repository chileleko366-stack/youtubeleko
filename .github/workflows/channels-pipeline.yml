name: All Channels Pipeline (CH1–CH5)

# ──────────────────────────────────────────────────────────────────────────────
# SCHEDULE
#   20:00 UTC — nightly stage: generate topics + scripts for next day (CH1-CH5)
#   04:00 UTC — morning stage: produce & upload longform (Tue/Fri) + 2 shorts/day
#
# MANUAL DISPATCH
#   stage: nightly | morning | all  (default: all)
#   force_longform: true | false    (override Tue/Fri gate)
# ──────────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: "0 20 * * *"   # nightly — topic & script generation
    - cron: "0 4 * * *"    # morning — production & upload
  workflow_dispatch:
    inputs:
      stage:
        description: "Pipeline stage to run: nightly | morning | all"
        required: false
        default: "all"
      channels:
        description: "Comma-separated channel IDs (e.g. ch1,ch3) or 'all'"
        required: false
        default: "all"
      force_longform:
        description: "Force longform even if not Tuesday/Friday (true/false)"
        required: false
        default: "false"

env:
  PYTHONPATH: ${{ github.workspace }}

# ── REUSABLE ENV BLOCK (referenced inline in each job) ────────────────────────
# All AI provider keys are passed to every step that calls the LLM.
# Keys marked CLOUDINARY_* are needed by generation steps only.
# Keys marked YOUTUBE_* are per-channel.

jobs:

# ──────────────────────────────────────────────────────────────────────────────
# GATE — determines which stages run this invocation
# ──────────────────────────────────────────────────────────────────────────────
  check-gate:
    name: Determine Pipeline Stage
    runs-on: ubuntu-latest
    outputs:
      run_nightly: ${{ steps.gate.outputs.run_nightly }}
      run_morning: ${{ steps.gate.outputs.run_morning }}
      run_longform: ${{ steps.gate.outputs.run_longform }}
    steps:
      - id: gate
        name: Evaluate schedule / dispatch inputs
        run: |
          SCHEDULE="${{ github.event.schedule }}"
          STAGE="${{ inputs.stage }}"
          EVENT="${{ github.event_name }}"
          FORCE="${{ inputs.force_longform }}"
          DAY=$(date +%u)   # 1=Mon … 7=Sun

          # ── nightly: topic+script generation ──────────────────────────────
          if [ "$SCHEDULE" = "0 20 * * *" ] || \
             { [ "$EVENT" = "workflow_dispatch" ] && \
               { [ "$STAGE" = "nightly" ] || [ "$STAGE" = "all" ]; }; }; then
            echo "run_nightly=true"  >> $GITHUB_OUTPUT
          else
            echo "run_nightly=false" >> $GITHUB_OUTPUT
          fi

          # ── morning: production + upload ──────────────────────────────────
          if [ "$SCHEDULE" = "0 4 * * *" ] || \
             { [ "$EVENT" = "workflow_dispatch" ] && \
               { [ "$STAGE" = "morning" ] || [ "$STAGE" = "all" ]; }; }; then
            echo "run_morning=true"  >> $GITHUB_OUTPUT
          else
            echo "run_morning=false" >> $GITHUB_OUTPUT
          fi

          # ── longform: only Tuesday (2) or Friday (5), or forced ───────────
          if [ "$DAY" = "2" ] || [ "$DAY" = "5" ] || [ "$FORCE" = "true" ]; then
            echo "run_longform=true"  >> $GITHUB_OUTPUT
            echo "Longform: YES (day=$DAY, force=$FORCE)"
          else
            echo "run_longform=false" >> $GITHUB_OUTPUT
            echo "Longform: NO (day=$DAY)"
          fi

# ══════════════════════════════════════════════════════════════════════════════
# NIGHTLY STAGE — Topic & Script Generation (20:00 UTC)
# ══════════════════════════════════════════════════════════════════════════════

  generate-topics:
    name: Generate Topics (CH1–CH5)
    needs: check-gate
    if: needs.check-gate.outputs.run_nightly == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      models: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Generate topics for all channels
        id: gen_topics
        run: python scripts/generate_topics.py
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:       ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:      ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:           ${{ github.token }}
          TOGETHER_API_KEY:       ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY:         ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify — topics generated
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status = "${STATUS}"
          icon = "✅" if status == "success" else "❌"
          date_str = date.today().isoformat()
          provider = os.environ.get("AI_PROVIDER", "")
          note = f" _(via {provider})_" if provider else ""
          send_message(f"{icon} *Nightly* — Topics generated for {date_str}{note}")
          if status == "success":
              notify_pipeline_success("Nightly — Topics", date_str, provider)
          else:
              notify_pipeline_failure("Nightly — Topics", date_str, f"Job: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:            ${{ secrets.GMAIL_TO }}
          AI_PROVIDER:         ${{ steps.gen_topics.outputs.ai_provider }}
        continue-on-error: true

  generate-scripts:
    name: Generate 7-Stage Scripts (CH1–CH5)
    needs: generate-topics
    if: needs.generate-topics.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      models: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Generate full production manifests
        id: gen_scripts
        run: python scripts/write_scripts.py
        env:
          GROQ_API_KEY:           ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY:       ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY:      ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN:           ${{ github.token }}
          TOGETHER_API_KEY:       ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY:         ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN:   ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME:  ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:     ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET:  ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify — scripts generated
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status = "${STATUS}"
          icon = "✅" if status == "success" else "❌"
          date_str = date.today().isoformat()
          provider = os.environ.get("AI_PROVIDER", "")
          note = f" _(via {provider})_" if provider else ""
          send_message(f"{icon} *Nightly* — Script generation {status} for {date_str}{note}")
          if status == "success":
              notify_pipeline_success("Nightly — Scripts", date_str, provider)
          else:
              notify_pipeline_failure("Nightly — Scripts", date_str, f"Job: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:          ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:            ${{ secrets.GMAIL_TO }}
          AI_PROVIDER:         ${{ steps.gen_scripts.outputs.ai_provider }}
        continue-on-error: true

# ══════════════════════════════════════════════════════════════════════════════
# MORNING STAGE — Longform Production (Tue/Fri) + 2 Shorts/day (every day)
# ══════════════════════════════════════════════════════════════════════════════

# ── SHARED SETUP STEPS (inlined per job — GitHub Actions has no reuse without composite actions) ──

# ──────────────────────────────────────────────────────────────────────────────
# LONGFORM — CH1 Dopamine Loop
# ──────────────────────────────────────────────────────────────────────────────
  produce-ch1:
    name: CH1 Longform — Dopamine Loop
    needs: check-gate
    if: >-
      needs.check-gate.outputs.run_morning == 'true' &&
      needs.check-gate.outputs.run_longform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: remotion/package.json }
      - run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - run: pip install -r requirements.txt
      - run: cd remotion && npm ci

      - name: Download manifest from Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.api, os, urllib.request
          from datetime import date
          from pathlib import Path
          cloudinary.config(cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"],
                            api_key=os.environ["CLOUDINARY_API_KEY"],
                            api_secret=os.environ["CLOUDINARY_API_SECRET"], secure=True)
          date_str = date.today().isoformat()
          r = cloudinary.api.resource(f"automation/manifests/{date_str}/ch1", resource_type="raw")
          Path("temp/manifests").mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(r["secure_url"], "temp/manifests/ch1.json")
          print(f"Downloaded ch1 manifest for {date_str}")
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Notify start
        run: python -c "from scripts.telegram_notify import send_message; from datetime import date; send_message(f'*Morning* — CH1 Dopamine Loop started ({date.today().isoformat()})')"
        env: { TELEGRAM_BOT_TOKEN: "${{ secrets.TELEGRAM_BOT_TOKEN }}", TELEGRAM_CHAT_ID: "${{ secrets.TELEGRAM_CHAT_ID }}" }
        continue-on-error: true

      - run: python scripts/stock_footage.py temp/manifests/ch1.json
        env: { PEXELS_API_KEY: "${{ secrets.PEXELS_API_KEY }}" }
      - run: python scripts/generate_voiceover.py temp/manifests/ch1.json
      - run: python scripts/generate_thumbnail.py temp/manifests/ch1.json
      - run: python scripts/render_mographs.py temp/manifests/ch1.json
      - run: python scripts/assemble_video.py temp/manifests/ch1.json
      - name: Upload to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch1.json
        env:
          YOUTUBE_CLIENT_ID:          ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:      ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH1:  ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}
      - name: Back up to Drive
        run: python scripts/upload_drive.py temp/manifests/ch1.json
        env: { GOOGLE_DRIVE_CREDENTIALS: "${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}" }
        continue-on-error: true

      - name: Notify complete
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os; from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          s="${STATUS}"; icon="✅" if s=="success" else "❌"; d=date.today().isoformat()
          send_message(f"{icon} *Morning* — CH1 Dopamine Loop {s} ({d})")
          notify_pipeline_success("Morning — CH1",d,"") if s=="success" else notify_pipeline_failure("Morning — CH1",d,f"Job: {s}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        continue-on-error: true

