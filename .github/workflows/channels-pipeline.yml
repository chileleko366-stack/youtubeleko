# ══════════════════════════════════════════════════════════════════════════════
# DAILY SUMMARY — always runs after all morning jobs
# Only depends on shorts jobs (they always run); longform jobs are skipped Mon/Wed/Thu/Sat/Sun
# ══════════════════════════════════════════════════════════════════════════════
  daily-summary:
    name: Daily Summary & Cleanup
    needs:
      - shorts-ch1-1
      - shorts-ch1-2
      - shorts-ch2-1
      - shorts-ch2-2
      - shorts-ch3-1
      - shorts-ch3-2
      - shorts-ch4-1
      - shorts-ch4-2
      - shorts-ch5-1
      - shorts-ch5-2
    if: always() && needs.shorts-ch1-1.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt

      - name: Send daily summary
        run: |
          python - <<'PYEOF'
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success
          from datetime import date
          d = date.today().isoformat()
          send_message(
              f"📊 *Daily Summary* — All CH1-5 shorts produced for {d}. "
              f"Longform runs Tue/Fri. Videos scheduled to publish at 18:00 UTC."
          )
          notify_pipeline_success("Morning — Daily Summary", d, "")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        continue-on-error: true

      - name: Cleanup old Cloudinary assets
        run: python scripts/cleanup_cloudinary.py
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true
