      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - name: Install system deps (FFmpeg + fonts)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-liberation fonts-open-sans fonts-dejavu-core
      - run: pip install -r requirements.txt
      - name: Install Remotion dependencies
        run: npm ci --prefix remotion
        continue-on-error: true

      - name: Generate + assemble Short 1
        run: |
          python scripts/generate_shorts.py ch1 1
          python scripts/assemble_shorts.py temp/manifests/ch1_short_1.json
        env:
