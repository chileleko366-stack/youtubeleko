# ══════════════════════════════════════════════════════════════════════════════
# DAILY SUMMARY — always runs once all shorts jobs finish
# Depends only on shorts jobs (always-running) not longform (conditional).
# This guarantees it fires every morning regardless of day-of-week.
# ══════════════════════════════════════════════════════════════════════════════

  daily-summary:
    name: "📊 Daily Summary & Cloudinary Cleanup"
    needs:
      - check-gate
      - shorts-ch1
      - shorts-ch2
      - shorts-ch3
      - shorts-ch4
      - shorts-ch5
    # Run when morning was triggered (shorts ran or were at least attempted)
    if: always() && needs.check-gate.outputs.run_morning == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt

      - name: Build and send daily summary
        run: |
          python - <<'PYEOF'
          import json, os
          from datetime import date
          from pathlib import Path
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure

          date_str = date.today().isoformat()

          # Collect per-channel short titles for the summary
          channels = [
              ("ch1", "Dopamine Loop",    "🟡"),
              ("ch2", "FinanceFiction",   "🟢"),
              ("ch3", "Redacted",         "🔴"),
              ("ch4", "The Grey Matter",  "🟣"),
              ("ch5", "The Quiet Record", "🟤"),
          ]

          results = []
          for ch_id, name, icon in channels:
              titles = []
              for i in (1, 2):
                  try:
                      p = Path(f"temp/manifests/{ch_id}_short_{i}.json")
                      if p.exists():
                          d = json.loads(p.read_text())
                          titles.append(d.get("topic", {}).get("title", f"Short {i}")[:45])
                      else:
                          titles.append("(not produced)")
                  except Exception:
                      titles.append("(error)")
              results.append((icon, ch_id.upper(), name, titles))

          lines = [f"{icon} *{ch}* — {name}" for icon, ch, name, _ in results]
          detail = []
          for icon, ch, name, titles in results:
              detail.append(f"{icon} {ch}: _{titles[0]}_ / _{titles[1]}_")

          send_message(
              f"📊 *YoutuBeLeko Daily Summary* | `{date_str}`\n\n"
              f"10 Shorts produced (2 per channel):\n"
              + "\n".join(detail)
              + f"\n\nLongform runs Tue/Fri — videos publish at 18:00 UTC."
          )
          notify_pipeline_success("Morning — Daily Summary", date_str)
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        continue-on-error: true

      - name: Cleanup Cloudinary assets older than 7 days
        # Removes old manifests and rendered clips from Cloudinary to stay within free tier limits.
        # Non-fatal — a Cloudinary failure never blocks the pipeline.
        run: python scripts/cleanup_cloudinary.py
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true
