          s="${STATUS}"; icon="✅" if s=="success" else "❌"; d=date.today().isoformat()
          send_message(f"{icon} *Morning* — CH2 FinanceFiction {s} ({d})")
          notify_pipeline_success("Morning — CH2",d,"") if s=="success" else notify_pipeline_failure("Morning — CH2",d,f"Job: {s}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO:           ${{ secrets.GMAIL_TO }}
        continue-on-error: true

