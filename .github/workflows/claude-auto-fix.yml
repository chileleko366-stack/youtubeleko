name: Claude Auto-Fix — Nightly Pipeline

# Triggers automatically when the nightly pipeline fails.
# Requires ANTHROPIC_API_KEY in GitHub Secrets.
# Get a key at console.anthropic.com — the auto-fix uses ~2K tokens per run (fractions of a cent).
#
# What it does:
#   1. Downloads the failure logs from the failed run
#   2. Sends them to Claude with the full repo context
#   3. Claude reads the scripts, diagnoses the error, writes the fix
#   4. Commits and pushes directly to main
#   5. Sends you a Telegram with what was fixed
#
# To disable: delete this file or remove ANTHROPIC_API_KEY from Secrets.

on:
  workflow_run:
    workflows: ["Nightly Pipeline — Topic & Script Generation"]
    types: [completed]

jobs:
  auto-fix:
    name: Diagnose and auto-fix failure
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use a token with write access so Claude can push commits
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Collect failure logs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const run_id = context.payload.workflow_run.id;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const jobs = await github.rest.actions.listJobsForWorkflowRun({
              owner, repo, run_id,
            });

            let summary = `Nightly pipeline failure — run #${run_id}\n`;
            summary += `Triggered at: ${context.payload.workflow_run.created_at}\n\n`;

            for (const job of jobs.data.jobs) {
              if (job.conclusion !== 'success') {
                summary += `## Failed job: ${job.name}\n`;
                summary += `Steps:\n`;
                for (const step of job.steps || []) {
                  const icon = step.conclusion === 'failure' ? '❌' : (step.conclusion === 'success' ? '✅' : '⏭');
                  summary += `  ${icon} ${step.name}: ${step.conclusion || 'skipped'}\n`;
                }
                summary += `\nLogs (last 8000 chars):\n`;
                try {
                  const r = await github.rest.actions.downloadJobLogsForWorkflowRun({
                    owner, repo, job_id: job.id,
                  });
                  const text = Buffer.from(r.data).toString('utf8');
                  summary += text.slice(-8000) + '\n\n';
                } catch (e) {
                  summary += `(log download failed: ${e.message})\n\n`;
                }
              }
            }

            const trimmed = summary.slice(0, 16000);
            fs.writeFileSync('/tmp/failure_logs.txt', trimmed);
            console.log(`Wrote ${trimmed.length} chars of failure logs`);

      - name: Auto-fix with Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash,Read,Edit,Write"
          prompt: |
            The nightly YouTube automation pipeline just failed on GitHub Actions.
            Your job: diagnose the failure and push a minimal fix.

            Step 1 — Read the logs:
              Run: cat /tmp/failure_logs.txt

            Step 2 — Identify root cause.
              Focus on Python tracebacks and error messages.
              The most common failure points are:
                - scripts/ai_client.py  (AI provider errors, JSON parse failures)
                - scripts/generate_topics.py  (topic generation logic)
                - scripts/write_scripts.py  (7-stage script pipeline)

            Step 3 — Read the relevant file(s) to understand context before editing.

            Step 4 — Apply the minimal fix. Common issues to look for:
                - Pollinations returning prose instead of JSON → ensure jsonMode=True in payload
                - API key env var name mismatch
                - Missing import or syntax error introduced by a recent commit
                - Rate limit errors → add sleep or switch provider order
                - JSON parse failure → check for missing json-repair fallback

            Step 5 — Commit and push:
              git config user.email "auto-fix@github-actions"
              git config user.name "Claude Auto-Fix"
              git add <only the files you changed>
              git commit -m "auto-fix: <concise description of what you fixed and why>"
              git push origin HEAD

            RULES:
              - Fix ONLY what caused the failure — no cleanup, no refactoring
              - Never touch .github/workflows/ files
              - Never add pip packages without updating requirements.txt
              - If the failure is a transient network error (not a code bug), do NOT commit.
                Instead just print: SKIP: transient network error — no fix needed
              - If you cannot determine the fix with confidence, do NOT guess and commit.
                Instead print: SKIP: unable to determine fix — <reason>

        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify fix pushed
        if: success()
        run: |
          python - <<'PYEOF'
          import subprocess, os
          from scripts.telegram_notify import send_message
          # Get the commit message if a fix was pushed
          result = subprocess.run(
              ["git", "log", "-1", "--pretty=%s"],
              capture_output=True, text=True
          )
          msg = result.stdout.strip()
          if msg and not msg.startswith("auto-fix:"):
              # No new commit was pushed (Claude skipped)
              pass
          else:
              send_message(
                  f"🔧 *Auto-Fix Applied*\n"
                  f"Claude diagnosed and fixed the nightly pipeline failure.\n"
                  f"Commit: `{msg}`\n"
                  f"Check GitHub Actions to confirm the next run succeeds."
              )
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONPATH: ${{ github.workspace }}
        continue-on-error: true
