name: CH6 — Red Space Facts Pipeline

on:
  schedule:
    # Run daily at 09:00 UTC — Shorts every day, Longform auto-detected on Fridays
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_longform:
        description: "Force longform generation even if not Friday (true/false)"
        required: false
        default: "false"

env:
  PYTHONPATH: ${{ github.workspace }}
  DRIVE_OWNER_EMAIL: ${{ secrets.GMAIL_TO }}

# ──────────────────────────────────────────────────────────────────────────────
# DAY CHECK — determines whether to run the Friday longform job
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  check-day:
    name: Check Day of Week
    runs-on: ubuntu-latest
    outputs:
      run_longform: ${{ steps.check.outputs.run_longform }}
    steps:
      - id: check
        name: Is it Friday?
        run: |
          DAY=$(date +%u)
          FORCE="${{ github.event.inputs.force_longform }}"
          if [ "$DAY" = "5" ] || [ "$FORCE" = "true" ]; then
            echo "run_longform=true" >> $GITHUB_OUTPUT
            echo "Longform: YES (day=$DAY, force=$FORCE)"
          else
            echo "run_longform=false" >> $GITHUB_OUTPUT
            echo "Longform: NO (day=$DAY, force=$FORCE)"
          fi

# ──────────────────────────────────────────────────────────────────────────────
# SHORTS — runs every day
# ──────────────────────────────────────────────────────────────────────────────
  produce-shorts:
    name: CH6 — Daily Shorts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
      models: read
    outputs:
      title: ${{ steps.export_result.outputs.title }}
      duration: ${{ steps.export_result.outputs.duration }}
      desc_b64: ${{ steps.export_result.outputs.desc_b64 }}
      tags: ${{ steps.export_result.outputs.tags }}
      run_url: ${{ steps.export_result.outputs.run_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package.json
        continue-on-error: true

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci
        continue-on-error: true

      - name: Research + generate Shorts manifest
        id: gen_shorts
        run: python scripts/generate_ch6_shorts.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Assemble Shorts video
        run: python scripts/assemble_shorts.py temp/manifests/ch6_short.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload Short to Cloudinary
        id: upload_short_cloudinary
        run: |
          VIDEO=$(ls temp/output/ch6_*.mp4 2>/dev/null | head -1)
          if [ -n "$VIDEO" ]; then
            python scripts/upload_cloudinary_video.py "$VIDEO" ch6-shorts
          else
            echo "CLOUDINARY_VIDEO_URL=" >> "$GITHUB_OUTPUT"
            echo "No video file found to upload"
          fi
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      - name: Export result
        id: export_result
        if: always()
        env:
          CLOUDINARY_VIDEO_URL: ${{ steps.upload_short_cloudinary.outputs.CLOUDINARY_VIDEO_URL }}
        run: |
          python - <<'PYEOF'
          import base64, json, os
          from pathlib import Path

          title = "unknown"
          duration = "unknown"
          desc_b64 = ""
          tags = ""

          try:
              data = json.loads(Path("temp/manifests/ch6_short.json").read_text())
              topic    = data.get("topic", {})
              metadata = data.get("metadata", {})
              title = metadata.get("title", "") or topic.get("title", "") or "unknown"
              total_s = int(data.get("total_duration_seconds", 0))
              duration = f"{total_s}s" if total_s < 60 else f"{total_s // 60}m {total_s % 60}s"
              description = metadata.get("description", "")
              desc_b64 = base64.b64encode(description.encode()).decode()
              tags_list = metadata.get("tags", [])
              tags = ", ".join(tags_list) if isinstance(tags_list, list) else str(tags_list)
          except Exception as e:
              print(f"Manifest read error: {e}")

          video_url = os.environ.get("CLOUDINARY_VIDEO_URL", "")

          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"title={title}\n")
                  f.write(f"duration={duration}\n")
                  f.write(f"desc_b64={desc_b64}\n")
                  f.write(f"tags={tags}\n")
                  f.write(f"run_url={video_url}\n")
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# LONGFORM — runs on Fridays only (or when force_longform=true)
# ──────────────────────────────────────────────────────────────────────────────
  produce-longform:
    name: CH6 — Friday Longform
    needs: check-day
    if: needs.check-day.outputs.run_longform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
      models: read
    outputs:
      title: ${{ steps.export_result.outputs.title }}
      duration: ${{ steps.export_result.outputs.duration }}
      desc_b64: ${{ steps.export_result.outputs.desc_b64 }}
      tags: ${{ steps.export_result.outputs.tags }}
      run_url: ${{ steps.export_result.outputs.run_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Generate longform manifest (7-stage pipeline)
        id: gen_longform
        run: python scripts/generate_ch6_longform.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Fetch stock footage
        run: python scripts/stock_footage.py temp/manifests/ch6.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Generate voiceover
        run: python scripts/generate_voiceover.py temp/manifests/ch6.json

      - name: Generate thumbnail
        run: python scripts/generate_thumbnail.py temp/manifests/ch6.json

      - name: Render motion graphics
        run: python scripts/render_mographs.py temp/manifests/ch6.json

      - name: Assemble longform video
        run: python scripts/assemble_video.py temp/manifests/ch6.json

      - name: Upload Longform to Cloudinary
        id: upload_longform_cloudinary
        run: |
          VIDEO=$(ls temp/output/ch6_*.mp4 2>/dev/null | head -1)
          if [ -n "$VIDEO" ]; then
            python scripts/upload_cloudinary_video.py "$VIDEO" ch6-longform
          else
            echo "CLOUDINARY_VIDEO_URL=" >> "$GITHUB_OUTPUT"
            echo "No video file found to upload"
          fi
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      - name: Export result
        id: export_result
        if: always()
        env:
          CLOUDINARY_VIDEO_URL: ${{ steps.upload_longform_cloudinary.outputs.CLOUDINARY_VIDEO_URL }}
        run: |
          python - <<'PYEOF'
          import base64, json, os
          from pathlib import Path

          title = "unknown"
          duration = "unknown"
          desc_b64 = ""
          tags = ""

          try:
              data = json.loads(Path("temp/manifests/ch6.json").read_text())
              topic    = data.get("topic", {})
              metadata = data.get("metadata", {})
              title = metadata.get("title", "") or topic.get("title", "") or "unknown"
              total_s = int(data.get("total_duration_seconds", 0))
              duration = f"{total_s}s" if total_s < 60 else f"{total_s // 60}m {total_s % 60}s"
              description = metadata.get("description", "")
              desc_b64 = base64.b64encode(description.encode()).decode()
              tags_list = metadata.get("tags", [])
              tags = ", ".join(tags_list) if isinstance(tags_list, list) else str(tags_list)
          except Exception as e:
              print(f"Manifest read error: {e}")

          video_url = os.environ.get("CLOUDINARY_VIDEO_URL", "")

          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"title={title}\n")
                  f.write(f"duration={duration}\n")
                  f.write(f"desc_b64={desc_b64}\n")
                  f.write(f"tags={tags}\n")
                  f.write(f"run_url={video_url}\n")
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# SUMMARY — always runs, sends combined email
# ──────────────────────────────────────────────────────────────────────────────
  notify:
    name: Send Summary Email
    needs: [produce-shorts, produce-longform]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send summary email
        run: |
          python - <<'PYEOF'
          import base64, os
          from datetime import date
          from scripts.email_notify import send_email
          from scripts.telegram_notify import send_message

          date_str = date.today().isoformat()

          shorts_status   = "${{ needs.produce-shorts.result }}"
          shorts_title    = "${{ needs.produce-shorts.outputs.title }}" or "unknown"
          shorts_duration = "${{ needs.produce-shorts.outputs.duration }}" or "unknown"
          shorts_desc_b64 = "${{ needs.produce-shorts.outputs.desc_b64 }}"
          shorts_tags     = "${{ needs.produce-shorts.outputs.tags }}"
          shorts_run_url  = "${{ needs.produce-shorts.outputs.run_url }}"

          longform_status   = "${{ needs.produce-longform.result }}"
          longform_title    = "${{ needs.produce-longform.outputs.title }}" or "not run"
          longform_duration = "${{ needs.produce-longform.outputs.duration }}" or "unknown"
          longform_desc_b64 = "${{ needs.produce-longform.outputs.desc_b64 }}"
          longform_tags     = "${{ needs.produce-longform.outputs.tags }}"
          longform_run_url  = "${{ needs.produce-longform.outputs.run_url }}"

          def decode_desc(b64_str):
              if not b64_str:
                  return ""
              try:
                  return base64.b64decode(b64_str).decode("utf-8")
              except Exception:
                  return ""

          shorts_desc   = decode_desc(shorts_desc_b64)
          longform_desc = decode_desc(longform_desc_b64)

          shorts_ok    = shorts_status == "success"
          longform_ran = longform_status not in ("skipped", "")
          longform_ok  = longform_status == "success"

          shorts_icon  = "✅" if shorts_ok  else "❌"
          longform_icon = "✅" if longform_ok else ("⏭️" if not longform_ran else "❌")

          subject = f"[YoutuBeLeko] CH6 Red Space Facts — {date_str}"

          # ── Plain text ──────────────────────────────────────────────────────
          txt = [
              f"CH6 Red Space Facts — {date_str}",
              "",
              f"SHORTS {shorts_icon}",
              f"  Title:    {shorts_title}",
              f"  Duration: {shorts_duration}",
              f"  Status:   {shorts_status}",
          ]
          if shorts_run_url:
              txt.append(f"  Download: {shorts_run_url}  (Artifacts tab)")
          if shorts_desc:
              txt.append(f"  SEO Description:\n    {shorts_desc}")
          if shorts_tags:
              txt.append(f"  Tags: {shorts_tags}")
          txt.append("")
          if longform_ran:
              txt += [
                  f"LONGFORM {longform_icon}",
                  f"  Title:    {longform_title}",
                  f"  Duration: {longform_duration}",
                  f"  Status:   {longform_status}",
              ]
              if longform_run_url:
                  txt.append(f"  Download: {longform_run_url}  (Artifacts tab)")
              if longform_desc:
                  txt.append(f"  SEO Description:\n    {longform_desc}")
              if longform_tags:
                  txt.append(f"  Tags: {longform_tags}")
          else:
              txt.append("LONGFORM ⏭️  Not scheduled today — runs every Friday")

          body_text = "\n".join(txt)

          # ── HTML ────────────────────────────────────────────────────────────
          def video_card(icon, label, vtitle, vduration, vstatus, vrun_url, vdesc, vtags):
              dl_btn = (
                  f'<a href="{vrun_url}" style="display:inline-block;margin-top:6px;'
                  f'padding:8px 16px;background:#ff2222;color:#fff;text-decoration:none;'
                  f'border-radius:4px;font-weight:bold">⬇ Download MP4 (direct link)</a>'
                  if vrun_url else ""
              )
              desc_block = (
                  f'<p style="margin:8px 0 0;font-size:13px;color:#444">'
                  f'<b>SEO Description:</b><br>{vdesc}</p>'
                  if vdesc else ""
              )
              tags_block = (
                  f'<p style="margin:4px 0 0;font-size:12px;color:#666">'
                  f'<b>Tags:</b> {vtags}</p>'
                  if vtags else ""
              )
              return f"""
              <div style="border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:16px">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
                  <span style="font-size:20px">{icon}</span>
                  <span style="font-size:14px;font-weight:bold;color:#888;text-transform:uppercase">{label}</span>
                  <span style="margin-left:auto;font-size:12px;color:#888">{vstatus}</span>
                </div>
                <p style="margin:0;font-size:16px;font-weight:bold">{vtitle}</p>
                <p style="margin:4px 0 0;font-size:13px;color:#666">Duration: {vduration}</p>
                {dl_btn}
                {desc_block}
                {tags_block}
              </div>"""

          shorts_card = video_card(
              shorts_icon, "Short (60s)", shorts_title, shorts_duration,
              shorts_status, shorts_run_url, shorts_desc, shorts_tags
          )

          if longform_ran:
              longform_card = video_card(
                  longform_icon, "Longform", longform_title, longform_duration,
                  longform_status, longform_run_url, longform_desc, longform_tags
              )
          else:
              longform_card = (
                  '<div style="border:1px solid #eee;border-radius:8px;padding:16px;'
                  'color:#888;font-size:14px">⏭️ Longform not scheduled today — runs every Friday</div>'
              )

          body_html = f"""
          <div style="font-family:sans-serif;max-width:640px;margin:0 auto">
            <h2 style="color:#ff2222;margin-bottom:4px">🔴 Red Space Facts</h2>
            <p style="color:#888;margin-top:0">{date_str} — review &amp; upload manually to YouTube</p>
            {shorts_card}
            {longform_card}
            <p style="color:#aaa;font-size:11px;margin-top:24px">
              Videos are hosted on Cloudinary — click the button to download the MP4 directly. No login required.
            </p>
          </div>
          """

          send_email(subject, body_text, body_html)

          # ── Telegram ────────────────────────────────────────────────────────
          tg = [f"🔴 *CH6 Red Space Facts* — {date_str}"]
          tg.append(f"{shorts_icon} *Short:* _{shorts_title}_ ({shorts_duration})")
          if shorts_run_url:
              tg.append(f"[⬇ Download Short MP4]({shorts_run_url})")
          if longform_ran:
              tg.append(f"{longform_icon} *Longform:* _{longform_title}_ ({longform_duration})")
              if longform_run_url:
                  tg.append(f"[⬇ Download Longform MP4]({longform_run_url})")
          else:
              tg.append("⏭️ Longform: not today")
          try:
              send_message("\n".join(tg))
          except Exception:
              pass
          PYEOF
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
