name: CH6 — Red Space Facts Pipeline

on:
  schedule:
    # Run daily at 09:00 UTC — Shorts every day, Longform auto-detected on Tuesdays and Fridays
    - cron: "0 9 * * *"
  workflow_dispatch:
    inputs:
      force_shorts:
        description: "Force shorts generation (true/false)"
        required: false
        default: "false"
      force_longform:
        description: "Force longform generation even if not Tuesday/Friday (true/false)"
        required: false
        default: "false"

env:
  PYTHONPATH: ${{ github.workspace }}

# ──────────────────────────────────────────────────────────────────────────────
# DAY CHECK — determines whether to run the Tuesday/Friday longform job
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  check-day:
    name: Check Day of Week
    runs-on: ubuntu-latest
    outputs:
      run_longform: ${{ steps.check.outputs.run_longform }}
    steps:
      - id: check
        name: Is it Tuesday or Friday?
        run: |
          DAY=$(date +%u)
          FORCE="${{ github.event.inputs.force_longform }}"
          if [ "$DAY" = "2" ] || [ "$DAY" = "5" ] || [ "$FORCE" = "true" ]; then
            echo "run_longform=true" >> $GITHUB_OUTPUT
            echo "Longform: YES (day=$DAY, force=$FORCE)"
          else
            echo "run_longform=false" >> $GITHUB_OUTPUT
            echo "Longform: NO (day=$DAY, force=$FORCE)"
          fi

# ──────────────────────────────────────────────────────────────────────────────
# SHORTS 1 — runs every day
# ──────────────────────────────────────────────────────────────────────────────
  produce-short-1:
    name: CH6 — Daily Short 1
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
      models: read
    outputs:
      title: ${{ steps.export_result.outputs.title }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/festive-mendel-3VlkH

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci
        continue-on-error: true

      - name: Research + generate Short 1 manifest
        id: gen_shorts
        run: python scripts/generate_ch6_shorts.py --index 1
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Assemble Short 1 video
        run: python scripts/assemble_shorts.py temp/manifests/ch6_short_1.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Upload Short 1 to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch6_short_1.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH6: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH6 }}

      - name: Upload Short 1 video to Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.uploader, glob, os, sys
          from datetime import date
          cloudinary.config(cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"], api_key=os.environ["CLOUDINARY_API_KEY"], api_secret=os.environ["CLOUDINARY_API_SECRET"], secure=True)
          videos = sorted(glob.glob("temp/output/ch6_short_*_1*.mp4") + glob.glob("temp/output/ch6_short_1*.mp4"))
          if not videos:
              print("No short 1 video found — skipping Cloudinary upload"); sys.exit(0)
          result = cloudinary.uploader.upload_large(videos[-1], public_id=f"automation/shorts/{date.today().isoformat()}/ch6_short_1", resource_type="video", overwrite=True, chunk_size=6000000)
          print("Cloudinary:", result.get("secure_url"))
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      - name: Export result
        id: export_result
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          title = "unknown"
          try:
              data = json.loads(Path("temp/manifests/ch6_short_1.json").read_text())
              title = data.get("topic", {}).get("title", "") or "unknown"
          except Exception:
              pass
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"title={title}\n")
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# SHORTS 2 — runs every day (parallel with Short 1)
# ──────────────────────────────────────────────────────────────────────────────
  produce-short-2:
    name: CH6 — Daily Short 2
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
      models: read
    outputs:
      title: ${{ steps.export_result.outputs.title }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/festive-mendel-3VlkH

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci
        continue-on-error: true

      - name: Research + generate Short 2 manifest
        id: gen_shorts
        run: python scripts/generate_ch6_shorts.py --index 2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Assemble Short 2 video
        run: python scripts/assemble_shorts.py temp/manifests/ch6_short_2.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Upload Short 2 to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch6_short_2.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH6: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH6 }}

      - name: Upload Short 2 video to Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.uploader, glob, os, sys
          from datetime import date
          cloudinary.config(cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"], api_key=os.environ["CLOUDINARY_API_KEY"], api_secret=os.environ["CLOUDINARY_API_SECRET"], secure=True)
          videos = sorted(glob.glob("temp/output/ch6_short_*_2*.mp4") + glob.glob("temp/output/ch6_short_2*.mp4"))
          if not videos:
              print("No short 2 video found — skipping Cloudinary upload"); sys.exit(0)
          result = cloudinary.uploader.upload_large(videos[-1], public_id=f"automation/shorts/{date.today().isoformat()}/ch6_short_2", resource_type="video", overwrite=True, chunk_size=6000000)
          print("Cloudinary:", result.get("secure_url"))
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      - name: Export result
        id: export_result
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          title = "unknown"
          try:
              data = json.loads(Path("temp/manifests/ch6_short_2.json").read_text())
              title = data.get("topic", {}).get("title", "") or "unknown"
          except Exception:
              pass
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"title={title}\n")
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# LONGFORM — runs on Tuesdays and Fridays (or when force_longform=true)
# ──────────────────────────────────────────────────────────────────────────────
  produce-longform:
    name: CH6 — Tuesday/Friday Longform
    needs: check-day
    if: needs.check-day.outputs.run_longform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
      models: read
    outputs:
      title: ${{ steps.export_result.outputs.title }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/festive-mendel-3VlkH

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Generate longform manifest (7-stage pipeline)
        id: gen_longform
        run: python scripts/generate_ch6_longform.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Fetch stock footage
        run: python scripts/stock_footage.py temp/manifests/ch6.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Generate voiceover
        run: python scripts/generate_voiceover.py temp/manifests/ch6.json

      - name: Generate thumbnail
        run: python scripts/generate_thumbnail.py temp/manifests/ch6.json

      - name: Render motion graphics
        run: python scripts/render_mographs.py temp/manifests/ch6.json

      - name: Assemble longform video
        run: python scripts/assemble_video.py temp/manifests/ch6.json

      - name: Upload longform to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch6.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH6: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH6 }}

      - name: Upload longform video to Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.uploader, glob, os, sys
          from datetime import date
          cloudinary.config(cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"], api_key=os.environ["CLOUDINARY_API_KEY"], api_secret=os.environ["CLOUDINARY_API_SECRET"], secure=True)
          videos = sorted(glob.glob("temp/final/ch6*.mp4") + glob.glob("temp/output/ch6*.mp4"))
          if not videos:
              print("No longform video found — skipping Cloudinary upload"); sys.exit(0)
          result = cloudinary.uploader.upload_large(videos[-1], public_id=f"automation/videos/{date.today().isoformat()}/ch6_longform", resource_type="video", overwrite=True, chunk_size=6000000)
          print("Cloudinary:", result.get("secure_url"))
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY:    ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      - name: Export result
        id: export_result
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          title = "unknown"
          try:
              data = json.loads(Path("temp/manifests/ch6.json").read_text())
              title = (data.get("metadata", {}).get("title", "")
                       or data.get("topic", {}).get("title", "")
                       or "unknown")
          except Exception:
              pass
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"title={title}\n")
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# SUMMARY — always runs, sends combined email
# ──────────────────────────────────────────────────────────────────────────────
  notify:
    name: Send Summary Email
    needs: [produce-short-1, produce-short-2, produce-longform]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: claude/festive-mendel-3VlkH

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send summary email
        run: |
          SHORT1_STATUS="${{ needs.produce-short-1.result }}"
          SHORT1_TITLE="${{ needs.produce-short-1.outputs.title }}"
          SHORT2_STATUS="${{ needs.produce-short-2.result }}"
          SHORT2_TITLE="${{ needs.produce-short-2.outputs.title }}"
          LONGFORM_STATUS="${{ needs.produce-longform.result }}"
          LONGFORM_TITLE="${{ needs.produce-longform.outputs.title }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.email_notify import send_email
          from scripts.telegram_notify import send_message

          date_str = date.today().isoformat()
          short1_status = "${SHORT1_STATUS}"
          short1_title = "${SHORT1_TITLE}" or "unknown"
          short2_status = "${SHORT2_STATUS}"
          short2_title = "${SHORT2_TITLE}" or "unknown"
          longform_status = "${LONGFORM_STATUS}"
          longform_title = "${LONGFORM_TITLE}" or "not run"

          short1_ok = short1_status == "success"
          short2_ok = short2_status == "success"
          longform_ran = longform_status not in ("skipped", "")
          longform_ok = longform_status == "success"

          short1_icon = "✅" if short1_ok else "❌"
          short2_icon = "✅" if short2_ok else "❌"
          longform_icon = "✅" if longform_ok else ("⏭️" if not longform_ran else "❌")

          subject = f"[YoutuBeLeko] CH6 Red Space Facts — {date_str}"

          # Plain text
          lines = [
              f"CH6 Red Space Facts — {date_str}",
              "",
              f"SHORT 1 ({short1_icon}):  {short1_title}",
              f"  Status: {short1_status} — uploaded to YouTube + Cloudinary",
              f"SHORT 2 ({short2_icon}):  {short2_title}",
              f"  Status: {short2_status} — uploaded to YouTube + Cloudinary",
          ]
          if longform_ran:
              lines.append(f"LONGFORM ({longform_icon}): {longform_title}")
              lines.append(f"  Status: {longform_status} — uploaded to YouTube + Cloudinary")
          else:
              lines.append("LONGFORM: Not scheduled today (runs Tuesdays and Fridays)")

          body_text = "\n".join(lines)

          # HTML
          short1_row = (
              f"<tr>"
              f"<td style='padding:8px;border-bottom:1px solid #eee'><b>Short 1</b></td>"
              f"<td style='padding:8px;border-bottom:1px solid #eee'>{short1_icon} <b>{short1_title}</b></td>"
              f"<td style='padding:8px;border-bottom:1px solid #eee'>{short1_status}</td>"
              f"</tr>"
          )
          short2_row = (
              f"<tr>"
              f"<td style='padding:8px;border-bottom:1px solid #eee'><b>Short 2</b></td>"
              f"<td style='padding:8px;border-bottom:1px solid #eee'>{short2_icon} <b>{short2_title}</b></td>"
              f"<td style='padding:8px;border-bottom:1px solid #eee'>{short2_status}</td>"
              f"</tr>"
          )
          if longform_ran:
              longform_row = (
                  f"<tr>"
                  f"<td style='padding:8px'><b>Longform</b></td>"
                  f"<td style='padding:8px'>{longform_icon} <b>{longform_title}</b></td>"
                  f"<td style='padding:8px'>{longform_status}</td>"
                  f"</tr>"
              )
          else:
              longform_row = (
                  f"<tr>"
                  f"<td style='padding:8px' colspan='3' style='color:#888'>"
                  f"Longform not scheduled today — runs every Tuesday and Friday</td>"
                  f"</tr>"
              )

          body_html = f"""
          <div style="font-family:sans-serif;max-width:640px;margin:0 auto">
            <h2 style="color:#ff4444">🔴 Red Space Facts — {date_str}</h2>
            <p>Videos uploaded to YouTube and backed up to Cloudinary.</p>
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse">
              <tr style="background:#f5f5f5">
                <th style="padding:8px;text-align:left">Type</th>
                <th style="padding:8px;text-align:left">Title</th>
                <th style="padding:8px;text-align:left">Status</th>
              </tr>
              {short1_row}
              {short2_row}
              {longform_row}
            </table>
            <p style="color:#888;font-size:12px;margin-top:24px">
              Videos backed up to Cloudinary automation/shorts and automation/videos
            </p>
          </div>
          """

          send_email(subject, body_text, body_html)

          # Brief Telegram ping
          tg_parts = [f"🔴 *CH6 Red Space Facts* — {date_str}"]
          tg_parts.append(f"{short1_icon} Short 1: _{short1_title}_")
          tg_parts.append(f"{short2_icon} Short 2: _{short2_title}_")
          if longform_ran:
              tg_parts.append(f"{longform_icon} Longform: _{longform_title}_")
          tg_parts.append("Videos uploaded to YouTube + Cloudinary.")
          try:
              send_message("\n".join(tg_parts))
          except Exception:
              pass
          PYEOF
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
