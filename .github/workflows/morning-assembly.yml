name: Morning Assembly — Video Production & YouTube Upload

on:
  schedule:
    # Run at 04:00 UTC every morning (assemble videos from last night's manifests)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      manifest_date:
        description: "Manifest date (YYYY-MM-DD). Defaults to yesterday."
        required: false
        default: ""
      channels:
        description: "Channels to run: 'all' or comma-separated list (e.g. ch1,ch3)"
        required: false
        default: "all"

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  assemble:
    name: Assemble & Upload Videos
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read

    steps:
      # ── Setup ────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve manifest date and channel list
        run: |
          INPUT_DATE="${{ inputs.manifest_date }}"
          INPUT_CHAN="${{ inputs.channels }}"

          if [ -n "$INPUT_DATE" ]; then
            DATE="$INPUT_DATE"
          else
            DATE=$(date -u -d 'yesterday' '+%Y-%m-%d' 2>/dev/null \
              || date -u -v-1d '+%Y-%m-%d')
          fi

          [ -z "$INPUT_CHAN" ] && INPUT_CHAN="all"

          echo "MANIFEST_DATE=$DATE" >> "$GITHUB_ENV"
          echo "CHANNELS=$INPUT_CHAN" >> "$GITHUB_ENV"
          echo "Manifest date : $DATE"
          echo "Channels      : $INPUT_CHAN"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Remotion dependencies
        run: npm install --prefix remotion

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Notify start ─────────────────────────────────────────────────────────
      - name: Notify pipeline start
        run: |
          python - <<'PYEOF'
          import os
          from scripts.telegram_notify import send_message
          date     = os.environ["MANIFEST_DATE"]
          channels = os.environ["CHANNELS"]
          send_message(
              f"*Morning Assembly Started*\n"
              f"Date: `{date}` | Channels: `{channels}`"
          )
          PYEOF
        env:
          MANIFEST_DATE: ${{ env.MANIFEST_DATE }}
          CHANNELS: ${{ env.CHANNELS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      # ── Core assembly loop ───────────────────────────────────────────────────
      - name: Assemble all channels
        run: |
          python - <<'PYEOF'
          import asyncio
          import json
          import os
          import sys
          import time
          from pathlib import Path

          import requests

          sys.path.insert(0, "scripts")
          from assemble_video import assemble_video
          from generate_thumbnail import generate_thumbnail
          from generate_voiceover import generate_all_voiceovers
          from render_mographs import render_all_lines
          from stock_footage import fetch_all_footage
          from telegram_notify import send_message
          from upload_drive import backup_to_drive
          from upload_youtube import is_youtube_configured, upload_video

          ALL_CHANNELS = ["ch1", "ch2", "ch3", "ch4", "ch5"]

          cloud    = os.environ["CLOUDINARY_CLOUD_NAME"]
          date     = os.environ["MANIFEST_DATE"]
          chan_env = os.environ.get("CHANNELS", "all").strip()
          channels = ALL_CHANNELS if chan_env == "all" else [
              c.strip() for c in chan_env.split(",") if c.strip()
          ]

          Path("temp/thumbnails").mkdir(parents=True, exist_ok=True)
          Path("temp/final").mkdir(parents=True, exist_ok=True)

          results = {}

          for ch_id in channels:
              t0 = time.time()
              print(f"\n{'='*60}")
              print(f"  {ch_id.upper()} | manifests: {date}")
              print(f"{'='*60}")
              step = {}

              # ── Fetch manifest ────────────────────────────────────────────
              manifest_url = (
                  f"https://res.cloudinary.com/{cloud}/raw/upload"
                  f"/automation/manifests/{date}/{ch_id}.json"
              )
              r = requests.get(manifest_url, timeout=30)
              if r.status_code != 200:
                  print(f"  No manifest (HTTP {r.status_code}) — skipping")
                  results[ch_id] = {"ok": False, "reason": "no manifest"}
                  continue

              manifest = r.json()
              title    = manifest.get("metadata", {}).get("title", "Untitled")
              print(f"  Title: {title}")

              # ── Stock footage ─────────────────────────────────────────────
              try:
                  fetch_all_footage(manifest)
                  step["footage"] = "ok"
              except Exception as exc:
                  step["footage"] = f"warn: {exc}"
                  print(f"  [footage] {exc}")

              # ── Voiceover ─────────────────────────────────────────────────
              try:
                  asyncio.run(generate_all_voiceovers(manifest))
                  step["voiceover"] = "ok"
              except Exception as exc:
                  step["voiceover"] = f"warn: {exc}"
                  print(f"  [voiceover] {exc}")

              # ── Thumbnail ─────────────────────────────────────────────────
              thumbnail_path = f"temp/thumbnails/{ch_id}_thumbnail.png"
              try:
                  cfg = manifest.get("channel_config", {})
                  cfg["_channel_id"] = ch_id
                  hint = manifest.get("metadata", {}).get("thumbnail_prompt")
                  generate_thumbnail(title, cfg, thumbnail_path, hint)
                  step["thumbnail"] = "ok"
              except Exception as exc:
                  step["thumbnail"] = f"warn: {exc}"
                  thumbnail_path = None
                  print(f"  [thumbnail] {exc}")

              # ── Motion graphics ───────────────────────────────────────────
              try:
                  render_all_lines(manifest)
                  step["render"] = "ok"
              except Exception as exc:
                  step["render"] = f"warn: {exc}"
                  print(f"  [render] {exc}")

              # ── FFmpeg assembly ───────────────────────────────────────────
              output_path = f"temp/final/{ch_id}_final.mp4"
              if not assemble_video(manifest, None, [], [], output_path):
                  step["assembly"] = "FAILED"
                  results[ch_id] = {"ok": False, "title": title, "step": step, "reason": "assembly failed"}
                  send_message(f"*{ch_id.upper()}* assembly FAILED\nTitle: {title}")
                  continue
              step["assembly"] = "ok"

              # ── Google Drive backup ───────────────────────────────────────
              drive_id = None
              try:
                  drive_id = backup_to_drive(output_path, ch_id, date)
                  step["drive"] = "ok"
              except Exception as exc:
                  step["drive"] = f"warn: {exc}"
                  print(f"  [drive] {exc}")

              # ── YouTube upload ────────────────────────────────────────────
              drive_url = f"https://drive.google.com/file/d/{drive_id}" if drive_id else None

              if is_youtube_configured(ch_id):
                  vid_id = upload_video(output_path, thumbnail_path, manifest)
                  if vid_id:
                      step["youtube"] = vid_id
                      send_message(
                          f"✅ *{ch_id.upper()} Uploaded*\n"
                          f"Title: {title}\n"
                          f"https://youtu.be/{vid_id}"
                      )
                  else:
                      step["youtube"] = "upload failed"
                      send_message(
                          f"*{ch_id.upper()}* assembled — YouTube upload failed\n"
                          f"Title: {title}\n"
                          + (f"Drive: {drive_url}" if drive_url else "")
                      )
              else:
                  step["youtube"] = "not configured"
                  send_message(
                      f"*{ch_id.upper()}* saved to Drive (YouTube not configured)\n"
                      f"Title: {title}\n"
                      + (f"Drive: {drive_url}" if drive_url else "Drive backup failed")
                  )

              elapsed = round(time.time() - t0)
              results[ch_id] = {"ok": True, "title": title, "step": step, "elapsed_s": elapsed}
              print(f"  Done in {elapsed}s")

          # ── Print summary table ───────────────────────────────────────────
          print(f"\n{'='*60}")
          print("  SUMMARY")
          print(f"{'='*60}")
          any_failed = False
          for ch_id, data in results.items():
              if data.get("ok"):
                  yt = data["step"].get("youtube", "?")
                  print(f"  OK   {ch_id}: '{data['title']}' ({data.get('elapsed_s','?')}s) youtube={yt}")
              else:
                  any_failed = True
                  print(f"  FAIL {ch_id}: {data.get('reason', 'unknown')}")

          # Persist results for the summary notification step
          with open("/tmp/assembly_results.json", "w") as fh:
              json.dump(results, fh)

          if any_failed:
              sys.exit(1)
          PYEOF
        env:
          MANIFEST_DATE: ${{ env.MANIFEST_DATE }}
          CHANNELS: ${{ env.CHANNELS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}
          YOUTUBE_REFRESH_TOKEN_CH2: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH2 }}
          YOUTUBE_REFRESH_TOKEN_CH3: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH3 }}
          YOUTUBE_REFRESH_TOKEN_CH4: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH4 }}
          YOUTUBE_REFRESH_TOKEN_CH5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH5 }}
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      # ── Cleanup ───────────────────────────────────────────────────────────────
      - name: Cleanup old Cloudinary assets
        run: python scripts/cleanup_cloudinary.py
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true

      # ── Final summary ─────────────────────────────────────────────────────────
      - name: Send final summary
        if: always()
        run: |
          python - <<'PYEOF'
          import json
          import os
          from pathlib import Path
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure

          date         = os.environ.get("MANIFEST_DATE", "unknown")
          results_path = Path("/tmp/assembly_results.json")

          if not results_path.exists():
              send_message(
                  f"*Morning Assembly Done* — `{date}`\n"
                  "No results file — pipeline crashed before assembly."
              )
              notify_pipeline_failure("Morning Assembly", date, "No results file found")
          else:
              results  = json.loads(results_path.read_text())
              ok_count = sum(1 for v in results.values() if v.get("ok"))
              total    = len(results)
              lines    = []
              for ch_id, data in results.items():
                  if data.get("ok"):
                      yt = data["step"].get("youtube", "?")
                      yt_note = f"youtu.be/{yt}" if yt and len(yt) == 11 else yt
                      lines.append(f"  ✅ {ch_id.upper()}: {data['title'][:45]} ({yt_note})")
                  else:
                      lines.append(f"  ❌ {ch_id.upper()}: {data.get('reason', 'failed')}")

              body = "\n".join(lines)
              icon = "✅" if ok_count == total else "⚠️"
              send_message(
                  f"{icon} *Morning Assembly Complete* — `{date}`\n"
                  f"{ok_count}/{total} channels OK\n\n{body}"
              )
              if ok_count == total:
                  notify_pipeline_success("Morning Assembly", date)
              else:
                  notify_pipeline_failure(
                      "Morning Assembly", date,
                      f"{total - ok_count}/{total} channels failed"
                  )
          PYEOF
        env:
          MANIFEST_DATE: ${{ env.MANIFEST_DATE }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        continue-on-error: true
