          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH5 }}
      - name: Back up to Google Drive
        run: python scripts/upload_drive.py temp/manifests/ch5_short_1.json
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        continue-on-error: true

  shorts-ch5-2:
    name: CH5 — The Quiet Record Short 2
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json
      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Install Remotion dependencies
        run: cd remotion && npm ci
        continue-on-error: true
      - name: Generate short topic and script
        run: python scripts/generate_shorts.py ch5 2
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      - name: Assemble short video
        run: python scripts/assemble_shorts.py temp/manifests/ch5_short_2.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      - name: Upload short to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch5_short_2.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH5 }}
      - name: Back up to Google Drive
        run: python scripts/upload_drive.py temp/manifests/ch5_short_2.json
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        continue-on-error: true

# ──────────────────────────────────────────────────────────────────────────────
# DAILY SUMMARY & CLEANUP
# ──────────────────────────────────────────────────────────────────────────────
  daily-summary:
    name: Daily Summary & Cloudinary Cleanup
    runs-on: ubuntu-latest
    needs: [produce-ch1, produce-ch2, produce-ch3, produce-ch4, produce-ch5, shorts-ch1-1, shorts-ch1-2, shorts-ch2-1, shorts-ch2-2, shorts-ch3-1, shorts-ch3-2, shorts-ch4-1, shorts-ch4-2, shorts-ch5-1, shorts-ch5-2]
    if: always()
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send daily summary
        run: |
          python - <<'PYEOF'
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success
          from datetime import date
          date_str = date.today().isoformat()
          send_message(
              f"📊 *Daily Summary* — Morning pipeline complete for {date_str}. "
              f"Videos scheduled to publish at 18:00 UTC."
          )
          notify_pipeline_success("Morning — Daily Summary", date_str, "")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        continue-on-error: true

      - name: Cleanup old Cloudinary assets
        run: python scripts/cleanup_cloudinary.py
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true
