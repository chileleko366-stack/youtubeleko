    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read
    outputs:
      title: ${{ steps.export_result.outputs.title }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package-lock.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Download today's manifest from Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.api, os, urllib.request
          from datetime import date
          from pathlib import Path
          cloudinary.config(
              cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"],
              api_key=os.environ["CLOUDINARY_API_KEY"],
              api_secret=os.environ["CLOUDINARY_API_SECRET"],
              secure=True,
          )
          date_str = os.environ.get("DATE_OVERRIDE") or date.today().isoformat()
          public_id = f"automation/manifests/{date_str}/ch5"
          result = cloudinary.api.resource(public_id, resource_type="raw")
          Path("temp/manifests").mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(result["secure_url"], "temp/manifests/ch5.json")
          print(f"Manifest downloaded: ch5 / {date_str}")
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          DATE_OVERRIDE: ${{ inputs.date_override }}

      - name: Notify CH5 production start
        run: |
          python - <<'PYEOF'
          from scripts.telegram_notify import send_message
          from datetime import date
          send_message(f"*Morning Pipeline* — CH5 The Quiet Record production started ({date.today().isoformat()})")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Fetch stock footage
        run: python scripts/stock_footage.py temp/manifests/ch5.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Generate voiceover
        run: python scripts/generate_voiceover.py temp/manifests/ch5.json

      - name: Generate thumbnail
        run: python scripts/generate_thumbnail.py temp/manifests/ch5.json

      - name: Render motion graphics
        run: python scripts/render_mographs.py temp/manifests/ch5.json

      - name: Assemble video
        run: python scripts/assemble_video.py temp/manifests/ch5.json

      - name: Upload to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch5.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH5: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH5 }}

      - name: Back up to Google Drive
        run: python scripts/upload_drive.py temp/manifests/ch5.json
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        continue-on-error: true

      - name: Export result
        id: export_result
        if: always()
        run: |
          python - <<'PYEOF'
          import json, os
          from pathlib import Path
          title = "unknown"
          try:
              data = json.loads(Path("temp/manifests/ch5.json").read_text())
              title = (data.get("metadata", {}).get("title", "")
                       or data.get("topic", {}).get("title", "")
                       or "unknown")
          except Exception:
              pass
          out = os.environ.get("GITHUB_OUTPUT", "")
          if out:
              with open(out, "a") as f:
                  f.write(f"title={title}\n")
          PYEOF

      - name: Notify CH5 complete
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import json, os
          from datetime import date
          from pathlib import Path
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status = "${STATUS}"
          icon = "✅" if status == "success" else "❌"
          date_str = date.today().isoformat()
          title = ""
          try:
              manifest = json.loads(Path("temp/manifests/ch5.json").read_text())
              title = manifest.get("metadata", {}).get("title", "") or manifest.get("topic", {}).get("title", "")
          except Exception:
              pass
          title_note = f" — _{title}_" if title else ""
          send_message(f"{icon} *CH5 The Quiet Record* {status}{title_note} ({date_str})")
          if status == "success":
              notify_pipeline_success("Morning — CH5", date_str, title)
          else:
              notify_pipeline_failure("Morning — CH5", date_str, f"Job status: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        continue-on-error: true

# ──────────────────────────────────────────────────────────────────────────────
# DAILY SUMMARY & CLEANUP
# ──────────────────────────────────────────────────────────────────────────────
  daily-summary:
    name: Daily Summary & Cloudinary Cleanup
    runs-on: ubuntu-latest
    needs: [produce-ch1, produce-ch2, produce-ch3, produce-ch4, produce-ch5]
    if: always()
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send detailed morning summary email
        if: always()
        run: |
          CH1_STATUS="${{ needs.produce-ch1.result }}"
          CH2_STATUS="${{ needs.produce-ch2.result }}"
          CH3_STATUS="${{ needs.produce-ch3.result }}"
          CH4_STATUS="${{ needs.produce-ch4.result }}"
          CH5_STATUS="${{ needs.produce-ch5.result }}"
          CH1_TITLE="${{ needs.produce-ch1.outputs.title }}"
          CH2_TITLE="${{ needs.produce-ch2.outputs.title }}"
          CH3_TITLE="${{ needs.produce-ch3.outputs.title }}"
          CH4_TITLE="${{ needs.produce-ch4.outputs.title }}"
          CH5_TITLE="${{ needs.produce-ch5.outputs.title }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import send_morning_summary

          date_str = date.today().isoformat()

          channel_info = [
              ("ch1", "Dopamine Loop",   "${CH1_STATUS}", "${CH1_TITLE}"),
              ("ch2", "FinanceFiction",  "${CH2_STATUS}", "${CH2_TITLE}"),
              ("ch3", "Redacted",        "${CH3_STATUS}", "${CH3_TITLE}"),
              ("ch4", "The Grey Matter", "${CH4_STATUS}", "${CH4_TITLE}"),
              ("ch5", "The Quiet Record","${CH5_STATUS}", "${CH5_TITLE}"),
          ]

          results = {}
          for ch_id, ch_name, status, title in channel_info:
              ok = status == "success"
              results[ch_id] = {
                  "status": "ok" if ok else "error",
                  "title": title or ch_name,
                  "failed_step": "see GitHub Actions logs" if not ok else "",
                  "error": f"Job result: {status}" if not ok else "",
              }

          # Detailed email
          send_morning_summary(results, date_str)

          # Brief Telegram ping
          ok_count = sum(1 for d in results.values() if d["status"] == "ok")
          total = len(results)
          icon = "✅" if ok_count == total else ("⚠️" if ok_count > 0 else "❌")
          send_message(
              f"{icon} *Morning Pipeline* — {ok_count}/{total} videos produced ({date_str})"
              f"\nFull report sent to email."
          )
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        continue-on-error: true

      - name: Cleanup old Cloudinary assets
        run: python scripts/cleanup_cloudinary.py
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        continue-on-error: true
