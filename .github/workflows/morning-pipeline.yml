name: Morning Pipeline — Production & Upload

on:
  schedule:
    # Run at 04:00 UTC every day (picks up nightly manifests, publishes at 18:00 UTC)
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      channels:
        description: "Comma-separated channel IDs to run (e.g. ch1,ch3) or 'all'"
        required: false
        default: "all"

env:
  PYTHONPATH: ${{ github.workspace }}

# ──────────────────────────────────────────────────────────────────────────────
# DAY CHECK — determines whether to run the Tuesday/Friday longform jobs
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  check-day:
    name: Check Day of Week
    runs-on: ubuntu-latest
    outputs:
      run_longform: ${{ steps.check.outputs.run_longform }}
    steps:
      - id: check
        name: Is it Tuesday or Friday?
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "2" ] || [ "$DAY" = "5" ]; then
            echo "run_longform=true" >> $GITHUB_OUTPUT
          else
            echo "run_longform=false" >> $GITHUB_OUTPUT
          fi

# ──────────────────────────────────────────────────────────────────────────────
# CH1 — DOPAMINE LOOP
# ──────────────────────────────────────────────────────────────────────────────
  produce-ch1:
    name: CH1 — Dopamine Loop
    needs: check-day
    if: needs.check-day.outputs.run_longform == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Download today's manifest from Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.api, os, urllib.request
          from datetime import date
          from pathlib import Path
          cloudinary.config(
              cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"],
              api_key=os.environ["CLOUDINARY_API_KEY"],
              api_secret=os.environ["CLOUDINARY_API_SECRET"],
              secure=True,
          )
          date_str = date.today().isoformat()
          public_id = f"automation/manifests/{date_str}/ch1"
          result = cloudinary.api.resource(public_id, resource_type="raw")
          Path("temp/manifests").mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(result["secure_url"], "temp/manifests/ch1.json")
          print(f"Manifest downloaded: ch1 / {date_str}")
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Notify CH1 production start
        run: |
          python - <<'PYEOF'
          from scripts.telegram_notify import send_message
          from datetime import date
          send_message(f"*Morning Pipeline* — CH1 Dopamine Loop production started ({date.today().isoformat()})")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

      - name: Fetch stock footage
        run: python scripts/stock_footage.py temp/manifests/ch1.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Generate voiceover
        run: python scripts/generate_voiceover.py temp/manifests/ch1.json

      - name: Generate thumbnail
        run: python scripts/generate_thumbnail.py temp/manifests/ch1.json

      - name: Render motion graphics
        run: python scripts/render_mographs.py temp/manifests/ch1.json

      - name: Assemble video
        run: python scripts/assemble_video.py temp/manifests/ch1.json

      - name: Upload to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch1.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}

      - name: Back up to Google Drive
        run: python scripts/upload_drive.py temp/manifests/ch1.json
        env:
          GOOGLE_DRIVE_CREDENTIALS: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
        continue-on-error: true

      - name: Notify CH1 complete
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status = "${STATUS}"
          icon = "✅" if status == "success" else "❌"
          date_str = date.today().isoformat()
          send_message(f"{icon} *Morning Pipeline* — CH1 Dopamine Loop {status} ({date_str})")
          if status == "success":
              notify_pipeline_success("Morning — CH1", date_str, "")
          else:
              notify_pipeline_failure("Morning — CH1", date_str, f"Job status: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
        continue-on-error: true

