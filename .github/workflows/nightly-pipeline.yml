name: Nightly Pipeline — Topic & Script Generation

on:
  schedule:
    # Run at 20:00 UTC every night (content for next day)
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      channels:
        description: "Comma-separated channel IDs to run (e.g. ch1,ch3) or 'all'"
        required: false
        default: "all"

env:
  PYTHONPATH: ${{ github.workspace }}

jobs:
  generate-topics:
    name: Generate Topics for All Channels
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate topics
        id: gen_topics
        run: python scripts/generate_topics.py
        env:
          # ── Free AI providers — pipeline tries them in order until one works ─
          # Priority 1: Groq  (200K tokens/day free)  → console.groq.com
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Priority 2: Cerebras  (1M tokens/day free)  → cloud.cerebras.ai
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          # Priority 3: SambaNova  (free tier)  → cloud.sambanova.ai
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          # Priority 4: Gemini  (1M tokens/day — key from aistudio.google.com ONLY, not GCP)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Priority 5: GitHub Models  (auto-set — no secret needed)
          GITHUB_TOKEN: ${{ github.token }}
          # Priority 6: Together AI  (free *-Free models)  → api.together.ai
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          # Priority 7: OpenRouter  (free :free models)  → openrouter.ai
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          # Priority 8: Cloudflare Workers AI  (10K tokens/day)  → dash.cloudflare.com
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Priority 9: Pollinations — no key needed, always last resort
          # ─────────────────────────────────────────────────────────────────────
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify topic generation complete
        if: success()
        run: |
          python - <<'PYEOF'
          import os
          from scripts.telegram_notify import send_message
          from datetime import date
          provider = os.environ.get("AI_PROVIDER", "")
          provider_note = f" _(via {provider})_" if provider else ""
          send_message(f"*Nightly Pipeline* — Topics generated for {date.today().isoformat()}{provider_note}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ steps.gen_topics.outputs.ai_provider }}
        continue-on-error: true

  generate-scripts:
    name: Generate 7-Stage Scripts
    runs-on: ubuntu-latest
    needs: generate-topics
    timeout-minutes: 90
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate full production manifests
        id: gen_scripts
        run: python scripts/write_scripts.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify script generation complete
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from scripts.telegram_notify import send_message
          from datetime import date
          status = "${STATUS}"
          provider = os.environ.get("AI_PROVIDER", "")
          icon = "✅" if status == "success" else "❌"
          provider_note = f" _(via {provider})_" if provider else ""
          send_message(f"{icon} *Nightly Pipeline* — Script generation {status} for {date.today().isoformat()}{provider_note}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ steps.gen_scripts.outputs.ai_provider }}
        continue-on-error: true
