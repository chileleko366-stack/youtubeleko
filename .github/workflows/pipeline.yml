name: CH1–CH5 Daily Pipeline

on:
  schedule:
    # 04:00 UTC daily — topics → scripts → produce all channels → summary
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      channels:
        description: "Comma-separated channel IDs to run (e.g. ch1,ch3) or 'all'"
        required: false
        default: "all"

env:
  PYTHONPATH: ${{ github.workspace }}

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 1 — Topic generation (all channels)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  generate-topics:
    name: Generate Topics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate topics
        id: gen_topics
        run: python scripts/generate_topics.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify topics done
        if: always()
        run: |
          python - <<'PYEOF'
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          status = "${{ job.status }}"
          icon = "✅" if status == "success" else "❌"
          provider = os.environ.get("AI_PROVIDER", "")
          note = f" _(via {provider})_" if provider else ""
          send_message(f"{icon} *Topics* — {date.today().isoformat()}{note}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AI_PROVIDER: ${{ steps.gen_topics.outputs.ai_provider }}
        continue-on-error: true

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 2 — Script generation (7-stage pipeline, all channels)
# ──────────────────────────────────────────────────────────────────────────────
  generate-scripts:
    name: Generate Scripts
    runs-on: ubuntu-latest
    needs: generate-topics
    timeout-minutes: 90
    permissions:
      contents: read
      models: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate full production manifests
        id: gen_scripts
        run: python scripts/write_scripts.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          SAMBANOVA_API_KEY: ${{ secrets.SAMBANOVA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          TOGETHER_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Notify scripts done
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          import os
          from datetime import date
          from scripts.telegram_notify import send_message
          from scripts.email_notify import notify_pipeline_success, notify_pipeline_failure
          status = "${STATUS}"
          icon = "✅" if status == "success" else "❌"
          provider = os.environ.get("AI_PROVIDER", "")
          note = f" _(via {provider})_" if provider else ""
          date_str = date.today().isoformat()
          send_message(f"{icon} *Scripts* — {date_str}{note}")
          if status == "success":
              notify_pipeline_success("Scripts", date_str, provider)
          else:
              notify_pipeline_failure("Scripts", date_str, f"Job status: {status}")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          AI_PROVIDER: ${{ steps.gen_scripts.outputs.ai_provider }}
        continue-on-error: true

# ──────────────────────────────────────────────────────────────────────────────
# STAGE 3 — Production (all 5 channels in parallel)
# ──────────────────────────────────────────────────────────────────────────────
  produce-ch1:
    name: CH1 — Dopamine Loop
    runs-on: ubuntu-latest
    needs: generate-scripts
    timeout-minutes: 120
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: remotion/package.json

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Remotion dependencies
        run: cd remotion && npm ci

      - name: Download manifest from Cloudinary
        run: |
          python - <<'PYEOF'
          import cloudinary, cloudinary.api, os, urllib.request
          from datetime import date
          from pathlib import Path
          cloudinary.config(
              cloud_name=os.environ["CLOUDINARY_CLOUD_NAME"],
              api_key=os.environ["CLOUDINARY_API_KEY"],
              api_secret=os.environ["CLOUDINARY_API_SECRET"],
              secure=True,
          )
          date_str = date.today().isoformat()
          public_id = f"automation/manifests/{date_str}/ch1"
          result = cloudinary.api.resource(public_id, resource_type="raw")
          Path("temp/manifests").mkdir(parents=True, exist_ok=True)
          urllib.request.urlretrieve(result["secure_url"], "temp/manifests/ch1.json")
          print(f"Manifest downloaded: ch1 / {date_str}")
          PYEOF
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

      - name: Fetch stock footage
        run: python scripts/stock_footage.py temp/manifests/ch1.json
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

      - name: Generate voiceover
        run: python scripts/generate_voiceover.py temp/manifests/ch1.json

      - name: Generate thumbnail
        run: python scripts/generate_thumbnail.py temp/manifests/ch1.json

      - name: Render motion graphics
        run: python scripts/render_mographs.py temp/manifests/ch1.json

      - name: Assemble video
        run: python scripts/assemble_video.py temp/manifests/ch1.json

      - name: Upload to YouTube
        run: python scripts/upload_youtube.py temp/manifests/ch1.json
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_CH1: ${{ secrets.YOUTUBE_REFRESH_TOKEN_CH1 }}

      - name: Notify CH1 complete
        if: always()
        run: |
          STATUS="${{ job.status }}"
          python - <<PYEOF
          from datetime import date
          from scripts.telegram_notify import send_message
          status = "${STATUS}"
          icon = "✅" if status == "success" else "❌"
          send_message(f"{icon} *CH1 Dopamine Loop* — {status} ({date.today().isoformat()})")
          PYEOF
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true

