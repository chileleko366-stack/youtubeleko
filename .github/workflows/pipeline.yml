# ──────────────────────────────────────────────────────────────────────────────
# STAGE 4 — Daily summary email
# ──────────────────────────────────────────────────────────────────────────────
  daily-summary:
    name: Daily Summary
    runs-on: ubuntu-latest
    needs: [produce-ch1, produce-ch2, produce-ch3, produce-ch4, produce-ch5]
    if: always()
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Send daily summary
        run: |
          python - <<'PYEOF'
          from scripts.telegram_notify import send_message
          from scripts.email_notify import send_email
          from datetime import date

          date_str = date.today().isoformat()

          results = {
              "CH1 Dopamine Loop":     "${{ needs.produce-ch1.result }}",
              "CH2 FinanceFiction":    "${{ needs.produce-ch2.result }}",
              "CH3 Redacted":          "${{ needs.produce-ch3.result }}",
              "CH4 The Grey Matter":   "${{ needs.produce-ch4.result }}",
              "CH5 The Quiet Record":  "${{ needs.produce-ch5.result }}",
          }

          rows_html = ""
          tg_lines = [f"📊 *Daily Summary — {date_str}*", ""]
          for ch, status in results.items():
              icon = "✅" if status == "success" else "❌"
              rows_html += (
                  f"<tr>"
                  f"<td style='padding:8px;border-bottom:1px solid #eee'>{ch}</td>"
                  f"<td style='padding:8px;border-bottom:1px solid #eee'>{icon} {status}</td>"
                  f"</tr>"
              )
              tg_lines.append(f"{icon} {ch} — {status}")

          body_html = f"""
          <div style="font-family:sans-serif;max-width:560px;margin:0 auto">
            <h2 style="color:#333">📊 Daily Summary — {date_str}</h2>
            <table width="100%" cellpadding="0" cellspacing="0" style="border-collapse:collapse">
              <tr style="background:#f5f5f5">
                <th style="padding:8px;text-align:left">Channel</th>
                <th style="padding:8px;text-align:left">Result</th>
              </tr>
              {rows_html}
            </table>
          </div>
          """

          body_text = "\n".join(tg_lines)
          send_email(f"[YoutuBeLeko] Daily Summary — {date_str}", body_text, body_html)
          send_message("\n".join(tg_lines))
          PYEOF
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        continue-on-error: true
